<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Proxide hand drawn trust layers</title>
  <desc id="desc">A hand drawn trust staircase showing readonly, review handoff, and execute layers.</desc>
  <rect width="1200" height="760" rx="30" fill="#FBF6EA"/>
  <g opacity="0.35" stroke="#E6DCC8" stroke-width="1">
    <path d="M70 130H1130M70 190H1130M70 250H1130M70 310H1130M70 370H1130M70 430H1130M70 490H1130M70 550H1130M70 610H1130"/>
    <path d="M150 70V690M300 70V690M450 70V690M600 70V690M750 70V690M900 70V690M1050 70V690"/>
  </g>

  <text x="78" y="92" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="900">Trust is a staircase</text>
  <text x="78" y="130" fill="#5E6D68" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="24">not one giant permission switch</text>
  <path d="M78 146C204 156 390 143 544 150" stroke="#C58A3A" stroke-width="5" stroke-linecap="round"/>

  <g transform="translate(92 246)">
    <path d="M8 8C84 -3 220 2 286 14C301 63 296 230 284 280C201 291 82 287 12 279C-6 218 -5 65 8 8Z" fill="#EAF3ED" stroke="#183C37" stroke-width="3"/>
    <text x="34" y="56" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="900">1. readonly</text>
    <text x="34" y="96" fill="#5E6D68" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="21">look, don't touch</text>
    <path d="M36 128C84 122 173 122 240 129" stroke="#C58A3A" stroke-width="3" stroke-linecap="round"/>
    <text x="42" y="168" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">read</text>
    <text x="140" y="168" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">search</text>
    <text x="42" y="208" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">git diff</text>
    <text x="140" y="208" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">preview</text>
    <text x="42" y="254" fill="#5E6D68" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="20">first connection</text>
  </g>

  <g transform="translate(448 204)">
    <path d="M8 10C76 -4 233 2 300 14C318 70 314 268 300 326C215 340 76 336 12 326C-8 254 -4 78 8 10Z" fill="#FFF8E8" stroke="#183C37" stroke-width="3"/>
    <text x="34" y="58" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="900">2. handoff</text>
    <text x="34" y="98" fill="#5E6D68" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="21">write state, not source</text>
    <path d="M36 130C90 122 190 125 260 132" stroke="#C58A3A" stroke-width="3" stroke-linecap="round"/>
    <text x="42" y="172" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">review notes</text>
    <text x="42" y="214" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">edit plans</text>
    <text x="42" y="256" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">patch preview</text>
    <text x="42" y="302" fill="#5E6D68" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="20">local Agent applies</text>
  </g>

  <g transform="translate(812 152)">
    <path d="M8 10C82 -4 230 0 300 14C320 82 318 330 300 396C216 411 78 405 12 395C-7 306 -5 78 8 10Z" fill="#183C37" stroke="#183C37" stroke-width="3"/>
    <text x="34" y="62" fill="#FFF7EA" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="31" font-weight="900">3. execute</text>
    <text x="34" y="102" fill="#D6E1DC" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="21">only with intent</text>
    <path d="M36 134C90 126 190 129 260 136" stroke="#F0B86E" stroke-width="3" stroke-linecap="round"/>
    <text x="42" y="178" fill="#FFF7EA" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">write</text>
    <text x="150" y="178" fill="#FFF7EA" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">patch</text>
    <text x="42" y="220" fill="#FFF7EA" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">safe shell</text>
    <text x="150" y="220" fill="#FFF7EA" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">worktree</text>
    <text x="42" y="262" fill="#FFF7EA" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">publish</text>
    <text x="150" y="262" fill="#FFF7EA" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="23">PR handoff</text>
    <path d="M40 315C82 304 198 306 258 316C267 344 264 363 254 382C182 389 86 386 44 380C34 360 32 334 40 315Z" fill="#F0B86E"/>
    <text x="72" y="356" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="900">scoped mutation</text>
  </g>

  <g stroke="#C58A3A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M380 380C416 362 438 350 456 340"/>
    <path d="M748 344C780 322 798 298 820 282"/>
  </g>
  <path d="M445 331L463 337L450 352Z" fill="#C58A3A"/>
  <path d="M806 276L826 278L814 294Z" fill="#C58A3A"/>

  <g transform="translate(176 628)">
    <path d="M8 6C196 -4 650 0 830 10C844 37 838 70 826 92C620 102 188 101 12 91C-3 63 -2 28 8 6Z" fill="#FFFDF8" stroke="#C58A3A" stroke-width="2.5"/>
    <text x="38" y="58" fill="#183C37" font-family="Bradley Hand, Comic Sans MS, PingFang SC, Microsoft YaHei, sans-serif" font-size="25" font-weight="900">Modes keep each step narrow</text>
  </g>
</svg>
